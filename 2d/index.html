<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Residential Wiring Simulator</title>
    <script>
      window.__SIM_ASSET_VERSION__ = String(Date.now());
      document.write(`<link rel="stylesheet" href="./styles.css?v=${window.__SIM_ASSET_VERSION__}">`);
    </script>
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-undo" viewBox="0 0 24 24"><path d="M9 7H4v5"/><path d="M4.5 11.5A8 8 0 1 0 7 6.7"/></symbol>
      <symbol id="icon-redo" viewBox="0 0 24 24"><path d="M15 7h5v5"/><path d="M19.5 11.5A8 8 0 1 1 17 6.7"/></symbol>
      <symbol id="icon-save" viewBox="0 0 24 24"><path d="M5 4h12l2 2v16H5z"/><path d="M8 4v6h8V4"/><path d="M8 18h8"/></symbol>
      <symbol id="icon-folder" viewBox="0 0 24 24"><path d="M3 7h7l2 2h9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 11h18"/></symbol>
      <symbol id="icon-download" viewBox="0 0 24 24"><path d="M12 3v11"/><path d="m8 10 4 4 4-4"/><path d="M5 19h14"/></symbol>
      <symbol id="icon-upload" viewBox="0 0 24 24"><path d="M12 21V10"/><path d="m8 14 4-4 4 4"/><path d="M5 5h14"/></symbol>
      <symbol id="icon-layers" viewBox="0 0 24 24"><path d="m12 3 9 5-9 5-9-5z"/><path d="m3 12 9 5 9-5"/><path d="m3 16 9 5 9-5"/></symbol>
      <symbol id="icon-shield" viewBox="0 0 24 24"><path d="M12 3 19 6v5c0 5-3 8-7 10-4-2-7-5-7-10V6z"/><path d="M9 12h6"/></symbol>
      <symbol id="icon-zap" viewBox="0 0 24 24"><path d="m13 2-8 12h7l-1 8 8-12h-7z"/></symbol>
      <symbol id="icon-eraser" viewBox="0 0 24 24"><path d="m4 16 8-8 7 7-5 5H8z"/><path d="M13 20h8"/></symbol>
      <symbol id="icon-zoom-out" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M16 16l5 5"/><path d="M7.5 10.5h6"/></symbol>
      <symbol id="icon-zoom-in" viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M16 16l5 5"/><path d="M7.5 10.5h6"/><path d="M10.5 7.5v6"/></symbol>
      <symbol id="icon-shrink" viewBox="0 0 24 24"><path d="M9 3v6H3"/><path d="m9 9-6-6"/><path d="M15 21v-6h6"/><path d="m15 15 6 6"/></symbol>
      <symbol id="icon-expand" viewBox="0 0 24 24"><path d="M3 9V3h6"/><path d="M3 3l6 6"/><path d="M21 15v6h-6"/><path d="m21 21-6-6"/></symbol>
      <symbol id="icon-check" viewBox="0 0 24 24"><path d="m4 12 5 5L20 6"/></symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24"><path d="M20 6v6h-6"/><path d="M19 12a7 7 0 1 1-2-5"/></symbol>
      <symbol id="icon-palette" viewBox="0 0 24 24"><path d="M12 4a8 8 0 0 0 0 16h1.2a1.8 1.8 0 0 0 1.2-3.1 1.5 1.5 0 0 1 1-2.6H17a3 3 0 0 0 3-3c0-4-3.5-7.3-8-7.3z"/><circle cx="8" cy="10" r="1"/><circle cx="11" cy="7.5" r="1"/><circle cx="14.5" cy="8.5" r="1"/></symbol>
      <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M5 7h14"/><path d="M9 7V4h6v3"/><path d="M7 7l1 15h8l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></symbol>
      <symbol id="icon-power" viewBox="0 0 24 24"><path d="M12 3v8"/><path d="M7.2 6.8a8 8 0 1 0 9.6 0"/></symbol>
      <symbol id="icon-plug" viewBox="0 0 24 24"><path d="M8 3v6"/><path d="M16 3v6"/><path d="M6 9h12v3a6 6 0 0 1-12 0z"/><path d="M12 18v3"/></symbol>
      <symbol id="icon-alert" viewBox="0 0 24 24"><path d="M12 3 22 20H2z"/><path d="M12 9v5"/><path d="M12 17h.01"/></symbol>
      <symbol id="icon-message" viewBox="0 0 24 24"><path d="M4 5h16v11H8l-4 4z"/></symbol>
    </svg>
    <div class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">Residential wiring simulator</p>
          <h1>Outlet, switch, and protected-supply workbench</h1>
        </div>
        <div id="supplyStatus" class="status-strip" aria-live="polite"></div>
      </header>

      <main class="layout">
        <aside class="tool-panel" aria-label="Tool palette">
          <section class="panel-section">
            <div class="section-heading">
              <h2>Tools</h2>
            </div>
            <div id="toolPalette" class="tool-grid"></div>
          </section>

          <section class="panel-section">
            <div class="section-heading">
              <h2>Devices</h2>
            </div>
            <div id="devicePalette" class="device-grid"></div>
          </section>

        </aside>

        <section class="workspace">
          <div id="supplyRig" class="supply-rig" aria-label="Upstream protected supply">
            <div class="rig-unit breaker">
              <span class="unit-label">Breaker panel</span>
              <span id="breakerLamp" class="lamp-dot"></span>
              <div id="breakerActions" class="rig-actions"></div>
            </div>
            <div class="rig-link"></div>
            <div class="rig-unit gfci">
              <span class="unit-label">Upstream GFCI</span>
              <span id="upstreamGfciLamp" class="lamp-dot"></span>
              <div id="upstreamGfciActions" class="rig-actions"></div>
            </div>
            <div class="rig-link"></div>
            <div class="rig-unit outlet">
              <span class="unit-label">Protected outlet</span>
              <span class="plug-face"></span>
            </div>
            <div class="rig-link cord-link"></div>
            <div class="rig-unit cord">
              <span class="unit-label">Power cable</span>
              <span class="cord-wires">
                <i class="wire black"></i>
                <i class="wire white"></i>
                <i class="wire green"></i>
              </span>
            </div>
          </div>

          <div id="workspaceToolbar" class="workspace-toolbar command-bar" aria-label="Workspace controls">
            <div class="toolbar-group compact-group" aria-label="History">
              <span class="toolbar-group-label">History</span>
              <button id="undoButton" type="button" class="toolbar-button icon-button" data-action="undo" title="Undo last action" aria-label="Undo last action" disabled><svg class="ui-icon"><use href="#icon-undo"></use></svg></button>
              <button id="redoButton" type="button" class="toolbar-button icon-button" data-action="redo" title="Redo last undone action" aria-label="Redo last undone action" disabled><svg class="ui-icon"><use href="#icon-redo"></use></svg></button>
            </div>
            <div class="toolbar-group file-group" aria-label="Save and load">
              <span class="toolbar-group-label">Work</span>
              <button type="button" class="toolbar-button" data-action="save-state" title="Save this workbench in the browser"><svg class="ui-icon"><use href="#icon-save"></use></svg><span class="cmd-label">Save</span></button>
              <button id="loadButton" type="button" class="toolbar-button" data-action="load-state" title="Load the saved workbench"><svg class="ui-icon"><use href="#icon-folder"></use></svg><span class="cmd-label">Load</span></button>
              <button type="button" class="toolbar-button" data-action="export-state-file" title="Download this workbench as a file"><svg class="ui-icon"><use href="#icon-download"></use></svg><span class="cmd-label">Export</span></button>
              <button type="button" class="toolbar-button" data-action="import-state-file" title="Load a workbench file"><svg class="ui-icon"><use href="#icon-upload"></use></svg><span class="cmd-label">Import</span></button>
              <input id="stateFileInput" class="visually-hidden" type="file" accept=".json,application/json">
            </div>
            <div class="toolbar-group mode-group" aria-label="Board modes">
              <span class="toolbar-group-label">Modes</span>
              <button id="wireLayerModeButton" type="button" class="toolbar-button" data-action="toggle-wire-layer-mode" title="Toggle whether wire paths sit behind devices"><svg class="ui-icon"><use href="#icon-layers"></use></svg><span class="cmd-label">Wires front</span></button>
              <button id="groundFaultProbeButton" type="button" class="toolbar-button probe-button" data-action="toggle-ground-fault-probe" title="Click energized loads or receptacles to simulate a ground fault"><svg class="ui-icon"><use href="#icon-shield"></use></svg><span class="cmd-label">GFCI probe</span></button>
              <button id="lineShortProbeButton" type="button" class="toolbar-button probe-button" data-action="toggle-line-short-probe" title="Click loads or receptacles to simulate a line-neutral short"><svg class="ui-icon"><use href="#icon-zap"></use></svg><span class="cmd-label">L-N short</span></button>
              <button id="clearShortsButton" type="button" class="toolbar-button" data-action="clear-test-shorts" title="Clear active test faults" disabled><svg class="ui-icon"><use href="#icon-eraser"></use></svg><span class="cmd-label">Clear faults</span></button>
            </div>
            <div class="toolbar-group view-group" aria-label="Bench size and zoom controls">
              <span class="toolbar-group-label">View</span>
              <button type="button" class="toolbar-button icon-button" data-action="zoom-out" title="Zoom out" aria-label="Zoom out"><svg class="ui-icon"><use href="#icon-zoom-out"></use></svg></button>
              <span id="benchZoomLabel" class="zoom-label">100%</span>
              <button type="button" class="toolbar-button icon-button" data-action="zoom-in" title="Zoom in" aria-label="Zoom in"><svg class="ui-icon"><use href="#icon-zoom-in"></use></svg></button>
              <button type="button" class="toolbar-button" data-action="shrink-bench" title="Shrink the bench"><svg class="ui-icon"><use href="#icon-shrink"></use></svg><span class="cmd-label">Shrink</span></button>
              <button type="button" class="toolbar-button" data-action="expand-bench" title="Expand the bench"><svg class="ui-icon"><use href="#icon-expand"></use></svg><span class="cmd-label">Expand</span></button>
              <label>X <input id="benchWidthInput" type="number" min="520" max="4000" step="20" value="1000" aria-label="Bench width"></label>
              <label>Y <input id="benchHeightInput" type="number" min="360" max="3000" step="20" value="620" aria-label="Bench height"></label>
              <button type="button" class="toolbar-button" data-action="apply-bench-size" title="Apply custom bench size"><svg class="ui-icon"><use href="#icon-check"></use></svg><span class="cmd-label">Apply</span></button>
              <button type="button" class="toolbar-button" data-action="reset-bench-size" title="Reset bench size and zoom"><svg class="ui-icon"><use href="#icon-reset"></use></svg><span class="cmd-label">Reset view</span></button>
            </div>
            <div class="toolbar-group color-group" aria-label="Board background color">
              <span class="toolbar-group-label">Board</span>
              <label class="grid-color-control" for="gridColorPicker">
                <svg class="ui-icon"><use href="#icon-palette"></use></svg><span>Color</span>
                <input id="gridColorPicker" type="color" value="#f8fafc">
              </label>
              <input id="gridColorHex" class="grid-color-hex" type="text" inputmode="text" value="#f8fafc" aria-label="Grid color hex value">
              <div class="grid-rgb-group" aria-label="Grid RGB color values">
                <label>R <input id="gridColorR" type="number" min="0" max="255" value="248"></label>
                <label>G <input id="gridColorG" type="number" min="0" max="255" value="250"></label>
                <label>B <input id="gridColorB" type="number" min="0" max="255" value="252"></label>
              </div>
              <button type="button" class="toolbar-button" data-action="reset-grid-color"><svg class="ui-icon"><use href="#icon-reset"></use></svg><span class="cmd-label">Reset</span></button>
              <button type="button" class="toolbar-button danger" data-action="clear-board" title="Clear the workbench"><svg class="ui-icon"><use href="#icon-trash"></use></svg><span class="cmd-label">Clear</span></button>
            </div>
          </div>

          <div id="sandboxViewport" class="sandbox-viewport" aria-label="Scrollable wiring bench">
            <div id="sandboxScrollSpace" class="sandbox-scroll-space">
              <div id="sandbox" class="sandbox" aria-label="Wiring sandbox">
                <svg id="wireLayer" class="wire-layer" viewBox="0 0 1000 620" preserveAspectRatio="none" aria-hidden="true"></svg>
                <div class="supply-port">
                  <span>Supply</span>
                </div>
                <div id="boxLayer" class="box-layer"></div>
                <svg id="selectedWireLayer" class="selected-wire-layer" viewBox="0 0 1000 620" preserveAspectRatio="none" aria-hidden="true"></svg>
                <div id="selectionMarquee" class="selection-marquee" hidden></div>
              </div>
            </div>
          </div>
        </section>

        <aside class="inspector" aria-label="Selected box inspector">
          <section id="boxInspector" class="panel-section"></section>
          <section class="panel-section">
            <div class="section-heading">
              <h2>Diagnostics</h2>
            </div>
            <div id="diagnostics" class="diagnostics" aria-live="polite"></div>
            <div id="diagnosticChat" class="diagnostic-chat">
              <div id="diagnosticChatMessages" class="chat-messages" aria-live="polite"></div>
              <div id="diagnosticProposal" class="diagnostic-proposal"></div>
              <form id="diagnosticChatForm" class="chat-form">
                <input id="diagnosticChatInput" type="text" autocomplete="off" placeholder="Ask why this diagnostic was shown">
                <button type="submit"><svg class="ui-icon"><use href="#icon-message"></use></svg><span>Ask</span></button>
              </form>
              <div id="diagnosticChatStatus" class="chat-status"></div>
            </div>
          </section>
          <section class="panel-section">
            <div class="section-heading">
              <h2>Event Log</h2>
            </div>
            <div id="eventLog" class="event-log"></div>
          </section>
        </aside>
      </main>

      <div id="contextMenu" class="context-menu" hidden>
        <button type="button" data-action="delete-selected"><svg class="ui-icon"><use href="#icon-trash"></use></svg><span>Delete item</span></button>
      </div>
    </div>

    <script>
      document.write(`<script src="./app.js?v=${window.__SIM_ASSET_VERSION__}"><\/script>`);
    </script>
  </body>
</html>
