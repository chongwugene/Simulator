<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3D Simulator Accuracy-Locked Asset Boards</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #edf1f4;
        --ink: #17202a;
        --muted: #5d6875;
        --line: #cfd8df;
        --panel: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1480px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 26px 0 42px;
      }

      header {
        margin-bottom: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      figure {
        margin: 18px 0 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        overflow: hidden;
        box-shadow: 0 16px 42px rgba(32, 42, 53, 0.12);
      }

      figcaption {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        font-weight: 780;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Accuracy-Locked Asset Boards</h1>
        <p>Clean brand-new visual direction. Screw counts and labels follow the asset manifest.</p>
      </header>

      <figure>
        <figcaption>Outlets</figcaption>
        <img src="./outlets-accuracy-board.svg" alt="Accuracy-locked outlet assets">
      </figure>

      <figure>
        <figcaption>Switches</figcaption>
        <img src="./switches-accuracy-board.svg" alt="Accuracy-locked switch assets">
      </figure>

      <figure>
        <figcaption>Wires and cables</figcaption>
        <img src="./wiring-connectors-accuracy-board.svg" alt="Accuracy-locked wire and cable assets">
      </figure>

      <figure>
        <figcaption>Boxes, source, and lighting</figcaption>
        <img src="./boxes-supply-lighting-accuracy-board.svg" alt="Accuracy-locked box source and lighting assets">
      </figure>
    </main>
  </body>
</html>
